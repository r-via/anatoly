# Anatoly configuration — v1.0 format
# See docs/02-Architecture for schema reference.

project:
  name: anatoly
  monorepo: false

scan:
  include:
    - "src/**/*.ts"
    - "src/**/*.tsx"
  exclude:
    - "node_modules/**"
    - "dist/**"
    - "**/*.test.ts"
    - "**/*.spec.ts"
  auto_detect: true

# --- v1.0 sections ---

providers:
  anthropic:
    concurrency: 24
  google:
    mode: subscription
    concurrency: 10

models:
  quality: gemini-3-flash-preview
  fast: gemini-2.5-flash-lite
  deliberation: claude-opus-4-6
  code_summary: gemini-2.5-flash-lite

agents:
  enabled: true
  # scaffolding:                        # doc-generation scaffolding (default: models.quality)
  # review:                             # file review agent (default: models.quality)
  # deliberation:                       # tier-3 investigation agent (default: models.deliberation)

runtime:
  timeout_per_file: 600
  max_retries: 3
  concurrency: 8
  min_confidence: 70
  max_stop_iterations: 3

axes:
  utility:
    enabled: true
    model: gemini-2.5-flash
  duplication:
    enabled: true
    model: gemini-2.5-flash
  overengineering:
    enabled: true
    model: gemini-2.5-flash
  tests:
    enabled: true
  best_practices:
    enabled: true
  documentation:
    enabled: true
